# M5.3 A7 场景区域定义 — 7×7m 房间 + 2 固定箱障
#
# 房间墙: x,y ∈ [-3.5, 3.5] (7×7)
# 清扫外圈 outer: [-3.0, 3.0] (6×6, 距墙内缩 0.5)
#
# 箱障 (gz world 里的实际几何, A7 据此搭 box):
#   Box A: center (1.2, 1.2), 尺寸 0.5×0.5×0.5
#   Box B: center (-1.2, -1.0), 尺寸 0.5×0.5×0.5
#
# voids: 障碍 + 机器人半包络余量(~0.65),让 F2C swath 离箱障有净空,
#        避免 RPP collision_detection 一开就卡。A8 实测后再微调大小。
#   Box A void: center (1.2,1.2) ± 0.65 → [0.55, 1.85]²
#   Box B void: center (-1.2,-1.0) ± 0.65 → [-1.85,-0.55] × [-1.65,-0.35]

outer:
  - [-3.0, -3.0]
  - [3.0, -3.0]
  - [3.0, 3.0]
  - [-3.0, 3.0]
  - [-3.0, -3.0]

voids:
  - - [0.55, 0.55]
    - [1.85, 0.55]
    - [1.85, 1.85]
    - [0.55, 1.85]
    - [0.55, 0.55]
  - - [-1.85, -1.65]
    - [-0.55, -1.65]
    - [-0.55, -0.35]
    - [-1.85, -0.35]
    - [-1.85, -1.65]
