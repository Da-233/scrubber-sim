# Nav2 参数（ROS2 Jazzy + gz-sim 仿真，阿卡曼洗地车）
# 基于 legacy_q1_simulation/nav2_config（humble）改写，修正 humble->jazzy 不兼容点：
#   - recoveries_server -> behavior_server，删 Spin/BackUp（阿卡曼不能原地转/不倒车）
#   - 删 voxel_layer/pointcloud/base_scan（仿真当前只有单 lidar /scan + /sonar 可选）
#   - SLAM 模式下不用 AMCL（slam_toolbox 直接发 map->odom）

bt_navigator:
  ros__parameters:
    use_sim_time: true
    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20
    # 自定义阿卡曼 BT 路径由 launch 动态注入（default_nav_to_pose_bt_xml），
    # 删 Spin/BackUp（阿卡曼不原地转/不倒车），恢复只用 Wait/DriveOnHeading

controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 30.0

    general_goal_checker:
      stateful: true
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25

    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.6
      lookahead_dist: 1.5
      min_lookahead_dist: 1.0
      max_lookahead_dist: 2.5
      lookahead_time: 2.0
      use_velocity_scaled_lookahead_dist: true
      min_approach_linear_velocity: 0.05
      approach_velocity_scaling_dist: 1.0
      use_rotate_to_heading: false        # 阿卡曼必须 false
      allow_reversing: false              # 洗地机不倒车
      transform_tolerance: 0.5
      use_collision_detection: true
      max_allowed_time_to_collision_up_to_carrot: 1.0
      use_regulated_linear_velocity_scaling: true
      use_cost_regulated_linear_velocity_scaling: true
      cost_scaling_dist: 0.6
      cost_scaling_gain: 1.0
      inflation_cost_scaling_factor: 3.0
      regulated_linear_scaling_min_radius: 1.5
      regulated_linear_scaling_min_speed: 0.25
      use_interpolation: true

planner_server:
  ros__parameters:
    use_sim_time: true
    expected_planner_frequency: 1.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_smac_planner::SmacPlannerHybrid"
      minimum_turning_radius: 1.5
      reverse_penalty: 10.0
      change_penalty: 5.0
      non_straight_penalty: 1.2
      cost_travel_multiplier: 2.0
      downsampling_factor: 1
      tolerance: 0.5
      use_astar: true
      allow_unknown: true
      max_planning_time: 5.0
      motion_model_for_search: "DUBIN"    # 禁倒车
      angle_quantization_bins: 72
      analytic_expansion_ratio: 3.5

behavior_server:
  ros__parameters:
    use_sim_time: true
    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["wait", "drive_on_heading"]   # 阿卡曼可用：等待 + 小段直行；删 spin/backup
    wait:
      plugin: "nav2_behaviors::Wait"
    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"
    local_frame: odom
    global_frame: map
    robot_base_frame: base_footprint
    transform_tolerance: 0.5

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true
      footprint_padding: 0.03
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_footprint
      footprint: "[[-0.7, -0.5], [-0.7, 0.5], [0.7, 0.5], [0.7, -0.5]]"
      resolution: 0.05
      # 固定大尺寸 costmap（不 rolling），覆盖整个仿真场景，
      # 避免 slam 增量建图初期 costmap 太小导致起点 outside bounds
      rolling_window: false
      width: 30
      height: 30
      origin_x: -15.0
      origin_y: -15.0
      track_unknown_space: false
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        footprint_clearing_enabled: true
        max_obstacle_height: 2.0
        combination_method: 1
        scan:
          topic: /scan
          obstacle_max_range: 7.0
          obstacle_min_range: 0.0
          raytrace_max_range: 8.0
          raytrace_min_range: 0.0
          max_obstacle_height: 2.0
          min_obstacle_height: 0.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          inf_is_valid: true
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
        enabled: true
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: true
        inflation_radius: 0.8
        cost_scaling_factor: 3.0
        inflate_around_unknown: false
      always_send_full_costmap: true

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_footprint
      rolling_window: true
      width: 5
      height: 5
      resolution: 0.05
      footprint: "[[-0.7, -0.5], [-0.7, 0.5], [0.7, 0.5], [0.7, -0.5]]"
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        footprint_clearing_enabled: true
        max_obstacle_height: 2.0
        combination_method: 1
        scan:
          topic: /scan
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
          raytrace_max_range: 5.0
          raytrace_min_range: 0.0
          max_obstacle_height: 2.0
          min_obstacle_height: 0.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          inf_is_valid: true
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: true
        inflation_radius: 0.75
        cost_scaling_factor: 3.0
        inflate_around_unknown: false
      always_send_full_costmap: true

velocity_smoother:
  ros__parameters:
    use_sim_time: true
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    max_velocity: [0.6, 0.0, 2.5]
    min_velocity: [-0.6, 0.0, -2.5]
    max_accel: [2.5, 0.0, 3.2]
    max_decel: [-2.5, 0.0, -3.2]
    odom_topic: "odom"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0
