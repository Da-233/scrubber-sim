# opennav_coverage / Fields2Cover 参数（M5：弓字形全覆盖）
#
# 洗地车几何（来自 urdf/scrubber.urdf.xacro）：
#   wheel_base L     = 1.0 m
#   steering_limit δ = 0.8 rad ≈ 45.8°
#   几何 R_min = L/tan(δ) ≈ 0.97 m → 取 1.2（留 20% 余量，避 Reeds-Shepp fishtail）
#
# 刷盘有效宽：0.6 m（采购清单：刷盘 1.0m，但单趟有效清洗宽按 0.6m 留搭接）
#
# 注意：这份 yaml 由 m5.launch.py 与 nav2.yaml **同时**加载到 nav2_container。
# coverage_server 单独 namespace；bt_navigator 注册 navigate_complete_coverage 第二 navigator。

coverage_server:
  ros__parameters:
    use_sim_time: true
    # —— Fields2Cover 头部参数 ——
    default_headland_width: 0.5      # U 形掉头留边（车长 1.4m 的一半量级，保证转得开）
    robot_width: 1.0                 # 车宽（碰撞包络）
    operation_width: 0.6             # 单趟有效清洗宽（弓字行距）
    min_turning_radius: 0.3          # 阿卡曼最小转弯半径（几何 0.97 + 20% 余量）
    linear_curv_change: 100.0        # 曲率变化率上限（洗地车重，比 demo 0.7m 小车的 200 慢一倍）
    coordinates_in_cartesian_frame: true   # 直接走米制，不做 GPS/UTM 转换
    default_allow_overlap: false
    default_swath_angle_type: "BRUTE_FORCE"   # 自动找最优 swath 朝向（不像 demo 知道 0°对齐）
    default_swath_type: "LENGTH"
    default_path_continuity_type: "CONTINUOUS"
    default_path_type: "DUBIN"        # 不倒车（与 nav2.yaml 的 SmacPlannerHybrid 一致）

# —— controller_server 段 ——
# M5.2 第 6 坑修：nav2.yaml 默认 RPP 的 max_robot_pose_search_dist 太小 + local_costmap
# 太小（5×5），会导致 transformGlobalPlan 把 coverage path 全裁掉 "0 poses in plan"。
# 这里覆盖关键字段：
controller_server:
  ros__parameters:
    use_sim_time: true
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      # —— 关键放宽：让 RPP 能跟踪远点 ——
      max_robot_pose_search_dist: 15.0   # 默认 10m → 15m，覆盖整个 7×7 工区
      transform_tolerance: 1.0           # 默认 0.5 → 1.0，sim 抖动容忍
      # —— M5.3 A5: 重开 collision detection（半通过陷阱已解：F2C 上游吃 inner voids，
      #    path 不再几何穿障，RPP 下游兜动态/残余即可，不会一开就卡死）——
      # ★ 真车判据：use_collision_detection 必须全程 true，这是 M5.3 的核心达成项
      use_collision_detection: true
      # RPP 沿 path 前向投影的碰撞检查时间窗（秒）。0.6m/s × 1.0s ≈ 0.6m 前瞻。
      # 注意参数名是 *_time_to_collision_up_to_carrot（本版本无 max_allowed_collision_dist）
      max_allowed_time_to_collision_up_to_carrot: 1.0
      # 沿用 nav2.yaml 的阿卡曼配置
      desired_linear_vel: 0.6
      lookahead_dist: 1.5
      min_lookahead_dist: 1.0
      max_lookahead_dist: 2.5
      use_rotate_to_heading: false
      allow_reversing: false
      use_regulated_linear_velocity_scaling: true
      use_cost_regulated_linear_velocity_scaling: false
      regulated_linear_scaling_min_radius: 1.5
      regulated_linear_scaling_min_speed: 0.25
      use_interpolation: true

# —— local_costmap 段 ——
# 撑大到 14×14，覆盖整个 10×10 房间（车在 (-3.5,-3.5) 也能看到对角的 (3.5,3.5)）
# 否则 RPP 截 path 到 local_costmap 边界时丢光
local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_footprint
      rolling_window: true
      width: 14
      height: 14
      resolution: 0.05
      footprint: "[[-0.7, -0.5], [-0.7, 0.5], [0.7, 0.5], [0.7, -0.5]]"
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          obstacle_max_range: 7.0
          raytrace_max_range: 8.0
          data_type: "LaserScan"
          inf_is_valid: true
          clearing: true
          marking: true
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: true
        # M5.3 A8 调参：0.75→0.45。0.75 时弓字行进/掉头中 footprint 前向投影
        # 触及墙的膨胀层 → RPP collision detection 误判前方碰撞 → 车冻住不动
        # (recoveries=0,RPP 只零速不抛异常,recovery BT 不触发)。
        # 0.45 略过机器人内切半径 0.5，只在近接触才判碰撞，墙边正常弓字不误触发。
        # 障碍(箱)的净空由 F2C inner voids 上游保证，不靠 inflation。
        inflation_radius: 0.45
        cost_scaling_factor: 3.0
        inflate_around_unknown: false
      always_send_full_costmap: true

# bt_navigator 在 m5.launch.py 里用 nav2.yaml + coverage.yaml 双 yaml 加载，
# 后者覆盖前者同名段。M5 阶段**只**注册 navigate_complete_coverage 一个 navigator，
# 不要再加 to_pose/through_poses（NavigateToPoseNavigator 内部已经注册 ComputePathToPose
# 等 BT 节点，再 plugin_lib_names 显式列就会 "ID [ComputePathToPose] already registered"
# FATAL）。需要单点导航时另起 nav2.launch.py 即可。
bt_navigator:
  ros__parameters:
    use_sim_time: true
    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20
    navigators: ["navigate_complete_coverage"]
    navigate_complete_coverage:
      plugin: "opennav_coverage_navigator/CoverageNavigator"
    error_code_names:
      - compute_path_error_code
      - follow_path_error_code
      - compute_coverage_error_code
    # 只列 opennav 专属 BT 节点；CoverageNavigator 内部已注册它需要的所有原生节点
    plugin_lib_names:
      - opennav_compute_complete_coverage_action_bt_node
      - opennav_cancel_complete_coverage_action_bt_node
